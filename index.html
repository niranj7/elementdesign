    <!-- WebSite Schema Markup for Google Search Site Name -->
    <script type="application/ld+json">

      "@type": "WebSite",

        "Element Design",

      ],

    }
    </script>
    <style>
      #global-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000000;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
        font-family: 'Barlow', sans-serif;
      }
      #global-loader.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        text-align: center;
      }
      .loader-logo {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 70%);
        box-shadow: 0 0 40px rgba(255, 255, 255, 0.03);
        animation: pulseLogo 2s infinite ease-in-out;
      }
      .loader-logo img {
        width: 32px;
        height: 32px;
        object-fit: contain;
      }
      .loader-text {
        color: #ffffff;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-top: 10px;
        opacity: 0.9;
      }
      .loader-subtext {
        color: rgba(255, 255, 255, 0.4);
        font-size: 9px;
        font-weight: 400;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-top: -5px;
      }
      .loader-progress {
        width: 140px;
        height: 1px;
        background-color: rgba(255, 255, 255, 0.05);
        border-radius: 1px;
        overflow: hidden;
        margin-top: 10px;
      }
      .loader-progress-bar {
        width: 0%;
        height: 100%;
        background-color: #ffffff;
        box-shadow: 0 0 8px #ffffff;
        transition: width 0.4s ease-out;
        animation: progressAnim 4s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
      }
      @keyframes pulseLogo {
        0%, 100% {
          transform: scale(1);
          border-color: rgba(255, 255, 255, 0.1);
          box-shadow: 0 0 40px rgba(255, 255, 255, 0.03);
        }
        50% {
          transform: scale(1.05);
          border-color: rgba(255, 255, 255, 0.25);
          box-shadow: 0 0 50px rgba(255, 255, 255, 0.08);
        }
      }
      @keyframes progressAnim {
        0% { width: 0%; }
        20% { width: 30%; }
        45% { width: 55%; }
        70% { width: 85%; }
        100% { width: 95%; }
      }
    </style>
  </head>

  <body>
    <!-- Global Loader -->
    <div id="global-loader">
      <div class="loader-content">
        <div class="loader-logo">
          <img src="/logo-icon.png" alt="Element Designs Logo" />
        </div>
        <div class="loader-text">ELEMENT DESIGNS</div>
        <div class="loader-subtext">Reimagining Web Design...</div>
        <div class="loader-progress">
          <div class="loader-progress-bar"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
